<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1E7FE0" />
  <meta name="description" content="NIC — control y monitoreo del sistema de riego automatizado." />
  <title>NIC — Network de Irrigación de Cultivos</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="apple-touch-icon" href="assets/icon.svg" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Barra superior -->
  <header class="topbar">
    <div class="brand">
      <img class="brand__logo" src="assets/logo.svg" alt="" width="32" height="32" />
      <span class="brand__name">NIC</span>
    </div>
    <div class="topbar__status">
      <span id="demo-badge" class="demo-badge" hidden>DEMO</span>
      <div id="conn-pill" class="conn-pill conn-pill--warn" role="status" aria-live="polite">
        <span class="dot dot--warn" aria-hidden="true"></span><span>Conectando…</span>
      </div>
    </div>
  </header>

  <!-- Banner de conexion -->
  <div id="offline-banner" class="banner" role="alert" hidden>
    <span class="banner__text">Sin conexión con el dispositivo NIC.</span>
    <button type="button" class="banner__action btn btn--small btn--ghost-light">Reintentar</button>
  </div>

  <!-- Contenedor de pantallas -->
  <main id="view" class="view" aria-live="polite"></main>

  <!-- Navegacion inferior -->
  <nav class="tabbar" aria-label="Navegación principal">
    <button type="button" class="tab" data-route="inicio" aria-current="page">
      <span class="tab__icon">
        <svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
      </span>
      <span class="tab__label">Inicio</span>
    </button>
    <button type="button" class="tab" data-route="monitoreo">
      <span class="tab__icon">
        <svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      </span>
      <span class="tab__label">Monitoreo</span>
    </button>
    <button type="button" class="tab" data-route="control">
      <span class="tab__icon">
        <svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg>
      </span>
      <span class="tab__label">Control</span>
    </button>
    <button type="button" class="tab" data-route="alertas">
      <span class="tab__icon">
        <svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/></svg>
      </span>
      <span class="tab__label">Alertas</span>
      <span id="alerts-badge" class="tab__badge" hidden>0</span>
    </button>
    <button type="button" class="tab" data-route="ajustes">
      <span class="tab__icon">
        <svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </span>
      <span class="tab__label">Ajustes</span>
    </button>
  </nav>

  <script type="module" src="js/app.js"></script>
</body>
</html>
