<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1E7FE0" />
  <meta name="description" content="NIC — control y monitoreo del sistema de riego automatizado." />
  <title>NIC — Network de Irrigación de Cultivos</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="apple-touch-icon" href="assets/icon.svg" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Barra superior -->
  <header class="topbar">
    <div class="brand">
      <img class="brand__logo" src="assets/logo.svg" alt="" width="32" height="32" />
      <span class="brand__name">NIC</span>
    </div>
    <div id="conn-pill" class="conn-pill conn-pill--warn" role="status" aria-live="polite">
      <span class="dot dot--warn" aria-hidden="true"></span><span>Conectando…</span>
    </div>
  </header>

  <!-- Banner de conexion -->
  <div id="offline-banner" class="banner" role="alert" hidden>
    <span class="banner__text">Sin conexión con el dispositivo NIC.</span>
    <button type="button" class="banner__action btn btn--small btn--ghost-light">Reintentar</button>
  </div>

  <!-- Contenedor de pantallas -->
  <main id="view" class="view" aria-live="polite"></main>

  <!-- Navegacion inferior -->
  <nav class="tabbar" aria-label="Navegación principal">
    <button type="button" class="tab" data-route="inicio" aria-current="page">
      <span class="tab__icon" aria-hidden="true">⌂</span>
      <span class="tab__label">Inicio</span>
    </button>
    <button type="button" class="tab" data-route="monitoreo">
      <span class="tab__icon" aria-hidden="true">📈</span>
      <span class="tab__label">Monitoreo</span>
    </button>
    <button type="button" class="tab" data-route="control">
      <span class="tab__icon" aria-hidden="true">🎛️</span>
      <span class="tab__label">Control</span>
    </button>
    <button type="button" class="tab" data-route="alertas">
      <span class="tab__icon" aria-hidden="true">🔔</span>
      <span class="tab__label">Alertas</span>
      <span id="alerts-badge" class="tab__badge" hidden>0</span>
    </button>
    <button type="button" class="tab" data-route="ajustes">
      <span class="tab__icon" aria-hidden="true">⚙️</span>
      <span class="tab__label">Ajustes</span>
    </button>
  </nav>

  <script type="module" src="js/app.js"></script>
</body>
</html>
